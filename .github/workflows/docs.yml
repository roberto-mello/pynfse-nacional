name: docs

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    paths:
      - "docs/**"
      - "docs/conf.py"
      - "CHANGELOG.md"
      - "pyproject.toml"
      - "uv.lock"
      - "src/**"
      - "README.md"
      - "util/build_versioned_docs.py"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.sha || 'master' }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Build versioned docs
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            development_ref=HEAD
          else
            development_ref=origin/master
          fi
          uv run --no-project python util/build_versioned_docs.py \
            --repo "$GITHUB_WORKSPACE" \
            --output "$GITHUB_WORKSPACE/site" \
            --development-ref "$development_ref"

      - name: Verify site layout
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/latest/index.html
          test -f site/development/index.html
          release_versions=$(
            while read -r tag; do
              if [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] \
                && [[ "$(git cat-file -t "$tag")" == "tag" ]]; then
                echo "${tag#v}"
              fi
            done < <(git for-each-ref --format='%(refname:short)' refs/tags) \
              | sort -V | tail -n 5
          )
          test -n "$release_versions"
          latest_version=""
          while read -r version; do
            test -f "site/$version/index.html"
            latest_version="$version"
          done <<< "$release_versions"
          test -f "site/$latest_version/index.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    if: >-
      (github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
